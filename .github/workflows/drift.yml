name: Daily Drift Check

on:
  schedule:
    - cron: "30 20 * * *"   # 20:30 UTC is 2:00 AM IST

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up server
        run: curl https://YOUR-RENDER-URL.onrender.com

      - name: Wait for server to start
        run: sleep 30

      - name: Run drift check
        run: curl https://YOUR-RENDER-URL.onrender.com/run-drift
